name: Java Maven Build

on:
  push:
    branches: [ "main" ]

jobs:
  Compilar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar
        run: mvn clean compile
           
  Probar:
    runs-on: ubuntu-latest
    needs: Compilar
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Testear
        run: mvn clean test
